server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path serves index.html so the app handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed Vite assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache the entry HTML — needed so deploys take effect immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
